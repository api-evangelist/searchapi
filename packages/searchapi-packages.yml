note: >-
  SearchApi is a raw-HTTP/JSON API and does not ship a traditional per-language
  REST SDK — the docs instead publish copy-paste code samples in Python, Node,
  Ruby, Java, Go, PHP, Bash, R, Kotlin, Swift, C#, C, and C++. The first-party
  distributables below are integration/agent connectors published under the
  SearchApi GitHub org, plus the official Postman collection. Because there is no
  first-party REST client library, no `SDKs` pointer is emitted (that would
  overstate the surface).
