generated: '2026-07-23'
method: searched
status: published
source: https://www.searchapi.io/integrations/mcp
server:
  name: searchapi
  transport: http
  url: https://www.searchapi.io/mcp
  auth:
    type: token
    query_param: token
    header: X-MCP-Token
    note: >-
      Per-integration URL is issued from the dashboard MCP integrations page
      (https://www.searchapi.io/mcp_integrations). An anonymous POST to the
      server returns "MCP token required", so the live `tools/list` schema is
      token-gated; the tools below are enumerated from the published MCP
      integrations catalog, not from an authenticated introspection.
  clients:
    claude_code: 'claude mcp add searchapi "<YOUR_MCP_URL>" --transport http'
    claude_desktop:
      command: npx
      args: [mcp-remote, "<YOUR_MCP_URL>"]
    cursor: deep-link install from the MCP integrations page
bundles:
  note: >-
    Tools are grouped into configurable "bundles" (a bundle is a set of tools you
    attach to an assistant). Preconfigured bundles include Google Travel; custom
    bundles can be assembled from any of the engine tools below.
  examples: [Google Travel]
tools:
  # Enumerated from the published engine catalog on the MCP integrations page.
  # inputSchema per tool requires authenticated tools/list introspection.
  - name: google_search
    description: Structured Google Search (organic, ads, knowledge graph, etc.)
