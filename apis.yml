aid: searchapi
name: SearchApi
description: >-
  SearchApi is a real-time SERP and search-data API that gives applications and AI agents structured
  access to results from 100+ search engines — Google Search, Google Maps, Google News, Google Scholar,
  Google Images, Google Shopping, Google Trends, Google Jobs, YouTube, Bing, Baidu, and marketplace
  engines like Amazon, Walmart, and eBay — returning clean JSON instead of scraped HTML. It handles
  proxy rotation, CAPTCHA solving, and geographic/locale targeting server-side, and ships an MCP server
  plus "use-case bundles" that group selected endpoints around a job so agents can be handed a capability
  rather than a whole catalog. Used for SEO/rank tracking, market and price intelligence, RAG grounding,
  and agentic research workflows.
